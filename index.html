<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Passing-Bablok 회귀분석</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root { --bg:#fafafa; --fg:#222; --border:#ddd; --accent:#2c7be5; --warn:#fff3cd; --warnfg:#7a5d00; --err:#fde2e2; --errfg:#a01818; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", "Malgun Gothic", sans-serif; background:var(--bg); color:var(--fg); max-width:1100px; margin:20px auto; padding:0 16px; line-height:1.5; }
  h1 { margin-top:0; }
  h2 { border-bottom:1px solid var(--border); padding-bottom:6px; margin-top:28px; }
  textarea { width:100%; font-family: "Consolas", monospace; font-size:13px; padding:8px; border:1px solid var(--border); border-radius:4px; resize:vertical; }
  .controls { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin:10px 0; }
  button { background:var(--accent); color:#fff; border:0; padding:8px 16px; border-radius:4px; cursor:pointer; font-size:14px; }
  button.secondary { background:#6c757d; }
  button:hover { opacity:.9; }
  input[type=number] { width:80px; padding:4px 6px; border:1px solid var(--border); border-radius:4px; }
  .banner { padding:10px 12px; border-radius:4px; margin:8px 0; display:none; }
  .banner.warn { background:var(--warn); color:var(--warnfg); border:1px solid #ffe8a1; }
  .banner.err { background:var(--err); color:var(--errfg); border:1px solid #f5b4b4; }
  table { width:100%; border-collapse:collapse; background:#fff; }
  th, td { border:1px solid var(--border); padding:8px 12px; text-align:left; }
  th { background:#f1f3f5; width:35%; }
  .chart-wrap { background:#fff; border:1px solid var(--border); border-radius:4px; padding:12px; }
  footer { margin-top:30px; padding-top:12px; border-top:1px solid var(--border); color:#666; font-size:12px; }
  code { background:#eee; padding:1px 5px; border-radius:3px; }
</style>
</head>
<body>

<h1>Passing-Bablok 회귀분석</h1>
<p>두 측정법 비교 (method comparison). 데이터를 붙여넣고 <b>분석 실행</b>을 누르세요.</p>

<section>
  <label for="data"><b>데이터 입력</b> — 한 줄에 <code>X &lt;Tab&gt; Y</code> 한 쌍 (공백/쉼표 구분도 허용, <code>#</code>은 주석)</label>
  <textarea id="data" rows="12" placeholder="예:&#10;1.0&#9;1.1&#10;2.0&#9;2.3&#10;3.0&#9;3.2"></textarea>
  <div class="controls">
    <label>유의수준 α: <input id="alpha" type="number" value="0.05" step="0.01" min="0.001" max="0.5"></label>
    <button id="run">분석 실행</button>
    <button id="loadExample" class="secondary">예제 데이터</button>
    <button id="clear" class="secondary">지우기</button>
  </div>
  <div id="warnBanner" class="banner warn"></div>
  <div id="errBanner" class="banner err"></div>
</section>

<section id="resultsSection" style="display:none">
  <h2>결과</h2>
  <div id="summaryBox" style="margin-bottom:14px; padding:14px 16px; background:#eaf2ff; border-left:4px solid var(--accent); border-radius:4px; line-height:1.7;"></div>
  <table id="resultsTable"></table>
</section>

<section id="chartSection" style="display:none">
  <h2>산점도 및 회귀선</h2>
  <div class="chart-wrap"><canvas id="chart"></canvas></div>
</section>

<section id="cusumSection" style="display:none">
  <h2>CUSUM 선형성 검정</h2>
  <div class="chart-wrap"><canvas id="cusumChart"></canvas></div>
  <p id="cusumNote" style="color:#666; font-size:12px;">※ Kolmogorov-Smirnov 근사 임계값 사용 (α=0.05: 1.36, α=0.01: 1.63).</p>
</section>

<footer>
  Passing & Bablok, J Clin Chem Clin Biochem 1983;21:709-720. 모든 계산은 브라우저 내에서 수행됩니다 (서버 전송 없음).
</footer>

<script>
/* ---------- 수학 헬퍼 ---------- */
function median(arr) {
  const a = arr.slice().sort((x,y)=>x-y);
  const n = a.length;
  if (n === 0) return NaN;
  return n % 2 ? a[(n-1)/2] : 0.5*(a[n/2-1] + a[n/2]);
}
function erf(x) {
  const sign = x < 0 ? -1 : 1;
  x = Math.abs(x);
  const a1=0.254829592, a2=-0.284496736, a3=1.421413741, a4=-1.453152027, a5=1.061405429, p=0.3275911;
  const t = 1/(1 + p*x);
  const y = 1 - (((((a5*t + a4)*t) + a3)*t + a2)*t + a1)*t*Math.exp(-x*x);
  return sign*y;
}
function normCdf(x) { return 0.5*(1 + erf(x/Math.SQRT2)); }
function normInv(p) {
  // Acklam's approximation
  const a=[-3.969683028665376e+01,2.209460984245205e+02,-2.759285104469687e+02,1.383577518672690e+02,-3.066479806614716e+01,2.506628277459239e+00];
  const b=[-5.447609879822406e+01,1.615858368580409e+02,-1.556989798598866e+02,6.680131188771972e+01,-1.328068155288572e+01];
  const c=[-7.784894002430293e-03,-3.223964580411365e-01,-2.400758277161838e+00,-2.549732539343734e+00,4.374664141464968e+00,2.938163982698783e+00];
  const d=[7.784695709041462e-03,3.224671290700398e-01,2.445134137142996e+00,3.754408661907416e+00];
  const pl=0.02425, ph=1-pl;
  let q,r;
  if (p < pl) { q=Math.sqrt(-2*Math.log(p)); return (((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1); }
  if (p <= ph) { q=p-0.5; r=q*q; return (((((a[0]*r+a[1])*r+a[2])*r+a[3])*r+a[4])*r+a[5])*q/(((((b[0]*r+b[1])*r+b[2])*r+b[3])*r+b[4])*r+1); }
  q=Math.sqrt(-2*Math.log(1-p));
  return -(((((c[0]*q+c[1])*q+c[2])*q+c[3])*q+c[4])*q+c[5])/((((d[0]*q+d[1])*q+d[2])*q+d[3])*q+1);
}

/* ---------- 입력 파싱 ---------- */
function parseData(text) {
  const pairs = [];
  const warnings = [];
  let skipped = 0;
  const lines = text.split(/\r?\n/);
  for (const raw of lines) {
    const line = raw.trim();
    if (!line || line.startsWith('#')) continue;
    const tokens = line.split(/[\s,]+/);
    if (tokens.length < 2) { skipped++; continue; }
    const x = parseFloat(tokens[0]);
    const y = parseFloat(tokens[1]);
    if (!isFinite(x) || !isFinite(y)) { skipped++; continue; }
    pairs.push([x,y]);
  }
  if (pairs.length < 5) warnings.push(`표본수 n=${pairs.length} — 5 미만이면 결과 신뢰도가 낮습니다.`);
  if (pairs.length < 10) warnings.push('n<10에서는 Kendall 정규근사 p-value가 부정확할 수 있습니다.');
  // X 동점 체크
  const xs = pairs.map(p=>p[0]);
  const uniq = new Set(xs);
  if (uniq.size < xs.length) warnings.push('X에 동점값이 있어 일부 페어의 기울기가 ±∞로 처리됩니다 (PB 규약).');
  const xVar = (() => {
    const m = xs.reduce((a,b)=>a+b,0)/xs.length;
    return xs.reduce((a,b)=>a+(b-m)*(b-m),0);
  })();
  if (xVar === 0) throw new Error('X의 분산이 0입니다 — 회귀가 불가능합니다.');
  return { pairs, skipped, warnings };
}

/* ---------- Passing-Bablok ---------- */
function passingBablok(pairs, alpha) {
  const n = pairs.length;
  const slopes = [];
  for (let i = 0; i < n; i++) {
    for (let j = i+1; j < n; j++) {
      const dx = pairs[j][0] - pairs[i][0];
      const dy = pairs[j][1] - pairs[i][1];
      if (dx === 0 && dy === 0) continue;
      let s;
      if (dx === 0) s = dy > 0 ? Infinity : -Infinity;
      else s = dy / dx;
      if (s === -1) continue;
      slopes.push(s);
    }
  }
  slopes.sort((a,b)=>a-b);
  const N = slopes.length;
  const K = slopes.filter(s => s < -1).length;

  const midIdx = Math.floor(N/2) + K;
  let slope;
  if (N % 2) {
    slope = slopes[midIdx];
  } else {
    // 짝수인 경우: 두 중앙값의 평균 (shifted)
    slope = 0.5 * (slopes[N/2 - 1 + K] + slopes[N/2 + K]);
  }

  const z = normInv(1 - alpha/2);
  const Calpha = z * Math.sqrt(n*(n-1)*(2*n+5)/18);
  const M1 = Math.round((N - Calpha)/2);
  const M2 = N - M1 + 1;
  const lo = Math.max(0, Math.min(N-1, M1 - 1 + K));
  const hi = Math.max(0, Math.min(N-1, M2 - 1 + K));
  const slopeCI = [slopes[lo], slopes[hi]];

  const intercept = median(pairs.map(([x,y]) => y - slope*x));
  // slope CI 경계에 대응하는 intercept CI (낮은 기울기 → 높은 절편)
  const iHi = median(pairs.map(([x,y]) => y - slopeCI[0]*x));
  const iLo = median(pairs.map(([x,y]) => y - slopeCI[1]*x));
  const interceptCI = [iLo, iHi];

  return { slope, intercept, slopeCI, interceptCI, N, K, n };
}

/* ---------- Kendall's tau-b ---------- */
function kendallTau(pairs) {
  const n = pairs.length;
  let C = 0, D = 0, Tx = 0, Ty = 0;
  for (let i = 0; i < n; i++) {
    for (let j = i+1; j < n; j++) {
      const sx = Math.sign(pairs[j][0] - pairs[i][0]);
      const sy = Math.sign(pairs[j][1] - pairs[i][1]);
      if (sx === 0 && sy === 0) continue;
      if (sx === 0) { Tx++; continue; }
      if (sy === 0) { Ty++; continue; }
      if (sx*sy > 0) C++; else D++;
    }
  }
  const tau = (C - D) / Math.sqrt((C+D+Tx)*(C+D+Ty));
  const variance = n*(n-1)*(2*n+5)/18;
  const z = (C - D) / Math.sqrt(variance);
  const p = 2 * (1 - normCdf(Math.abs(z)));
  return { tau, z, pValue: p, C, D, Tx, Ty };
}

/* ---------- CUSUM 선형성 검정 ---------- */
function cusumLinearity(pairs, slope, intercept, alpha) {
  const sorted = pairs.slice().sort((a,b)=>a[0]-b[0]);
  const signs = [];
  for (const [x,y] of sorted) {
    const r = y - (intercept + slope*x);
    if (r > 0) signs.push(1);
    else if (r < 0) signs.push(-1);
    // r===0 은 제외
  }
  const nTotal = signs.length;
  if (nTotal === 0) return { maxT: 0, critical: 1.36, linear: true, series: [] };
  const series = [];
  let cs = 0, maxAbs = 0;
  signs.forEach((s,i) => {
    cs += s;
    series.push({ k: i+1, cusum: cs });
    if (Math.abs(cs) > maxAbs) maxAbs = Math.abs(cs);
  });
  const T = maxAbs / Math.sqrt(nTotal);
  const critical = alpha <= 0.01 ? 1.63 : alpha <= 0.05 ? 1.36 : 1.22;
  return { maxT: T, critical, linear: T < critical, series, nTotal };
}

/* ---------- 렌더링 ---------- */
function fmt(v, d=4) {
  if (!isFinite(v)) return v > 0 ? '+∞' : v < 0 ? '-∞' : 'NaN';
  return Number(v).toFixed(d);
}
function renderResults(res, pb, kt, cu) {
  const rows = [
    ['표본수 n', res.pairs.length],
    ['제외된 행', res.skipped],
    ['Passing-Bablok 기울기 b', `${fmt(pb.slope)}  (95% CI: ${fmt(pb.slopeCI[0])} ~ ${fmt(pb.slopeCI[1])})`],
    ['Passing-Bablok 절편 a', `${fmt(pb.intercept)}  (95% CI: ${fmt(pb.interceptCI[0])} ~ ${fmt(pb.interceptCI[1])})`],
    ['회귀식', `Y = ${fmt(pb.intercept)} + ${fmt(pb.slope)} · X`],
    ['계통오차 판정', (pb.interceptCI[0] <= 0 && pb.interceptCI[1] >= 0) ? '없음 (절편 CI가 0 포함)' : '있음 (절편 CI가 0 불포함)'],
    ['비례오차 판정', (pb.slopeCI[0] <= 1 && pb.slopeCI[1] >= 1) ? '없음 (기울기 CI가 1 포함)' : '있음 (기울기 CI가 1 불포함)'],
    ['Kendall τ_b', fmt(kt.tau)],
    ['Kendall z', fmt(kt.z, 3)],
    ['Kendall p-value', kt.pValue < 1e-4 ? kt.pValue.toExponential(3) : fmt(kt.pValue, 4)],
    ['CUSUM 통계량 T', fmt(cu.maxT, 3)],
    ['CUSUM 임계값', fmt(cu.critical, 3)],
    ['선형성 판정', cu.linear ? '선형 (H0 기각 못함)' : '비선형 (H0 기각)'],
  ];
  const html = rows.map(([k,v]) => `<tr><th>${k}</th><td>${v}</td></tr>`).join('');
  document.getElementById('resultsTable').innerHTML = html;

  // 총평 3줄
  const systematic = (pb.interceptCI[0] <= 0 && pb.interceptCI[1] >= 0);
  const proportional = (pb.slopeCI[0] <= 1 && pb.slopeCI[1] >= 1);
  const biasLine = (systematic && proportional)
    ? `① <b>두 방법의 측정값에 통계적으로 의미 있는 차이가 없습니다.</b> 서로 바꿔 써도 되는 수준입니다.`
    : (!systematic && !proportional)
      ? `① <b>두 방법 사이에 차이가 있습니다.</b> 한쪽이 일정하게 더 높거나 낮게 나오면서, 값이 커질수록 차이도 커집니다. 서로 바꿔 쓰기 어렵습니다.`
      : !systematic
        ? `① <b>한 방법이 다른 방법보다 일정한 양만큼 더 높게(또는 낮게) 나옵니다.</b> (절편 구간 ${fmt(pb.interceptCI[0],3)} ~ ${fmt(pb.interceptCI[1],3)})`
        : `① <b>값이 커질수록 두 방법의 차이도 점점 커집니다.</b> (기울기 구간 ${fmt(pb.slopeCI[0],3)} ~ ${fmt(pb.slopeCI[1],3)})`;

  const absTau = Math.abs(kt.tau);
  const strength = absTau >= 0.8 ? '매우 강한' : absTau >= 0.6 ? '강한' : absTau >= 0.4 ? '중간 정도의' : absTau >= 0.2 ? '약한' : '거의 없는';
  const sig = kt.pValue < 0.05 ? '이 관계는 우연이 아닙니다' : '다만 표본이 적거나 우연일 가능성도 있습니다';
  const corrLine = `② <b>두 방법의 값은 ${strength} 양의 관계를 보입니다.</b> (τ=${fmt(kt.tau,3)}, p=${kt.pValue < 1e-4 ? kt.pValue.toExponential(2) : fmt(kt.pValue,4)}) — ${sig}.`;

  const linLine = cu.linear
    ? `③ <b>두 방법의 관계는 직선으로 잘 설명됩니다.</b> (선형성 OK — Passing-Bablok 결과를 그대로 해석해도 됩니다.)`
    : `③ <b>두 방법의 관계가 직선이 아닐 가능성이 있습니다.</b> 값의 범위에 따라 차이가 달라질 수 있으니 해석에 주의하세요.`;

  document.getElementById('summaryBox').innerHTML = `<b>총평</b><br>${biasLine}<br>${corrLine}<br>${linLine}`;

  document.getElementById('resultsSection').style.display = '';
}

let mainChart = null, cusumChart = null;
function renderChart(pairs, pb) {
  const xs = pairs.map(p=>p[0]);
  const ys = pairs.map(p=>p[1]);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const lo = Math.min(xMin, yMin), hi = Math.max(xMax, yMax);
  const ctx = document.getElementById('chart').getContext('2d');
  if (mainChart) mainChart.destroy();
  mainChart = new Chart(ctx, {
    type: 'scatter',
    data: {
      datasets: [
        { label: '데이터', data: pairs.map(([x,y])=>({x,y})), backgroundColor: '#2c7be5', pointRadius: 4 },
        { label: `PB 회귀선 (Y=${fmt(pb.intercept,3)}+${fmt(pb.slope,3)}X)`, type:'line',
          data: [{x:xMin,y:pb.intercept+pb.slope*xMin},{x:xMax,y:pb.intercept+pb.slope*xMax}],
          borderColor:'#e55353', borderWidth:2, pointRadius:0, fill:false },
        { label: '동등선 y=x', type:'line',
          data: [{x:lo,y:lo},{x:hi,y:hi}],
          borderColor:'#888', borderDash:[6,4], borderWidth:1, pointRadius:0, fill:false },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { x: { title:{display:true,text:'X (방법 1)'} }, y: { title:{display:true,text:'Y (방법 2)'} } }
    }
  });
  document.getElementById('chart').parentElement.style.height = '450px';
  document.getElementById('chartSection').style.display = '';
}
function renderCusum(cu) {
  const ctx = document.getElementById('cusumChart').getContext('2d');
  if (cusumChart) cusumChart.destroy();
  const n = cu.nTotal || 1;
  const critLine = cu.critical * Math.sqrt(n);
  const labels = cu.series.map(s => s.k);
  cusumChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'CUSUM', data: cu.series.map(s=>s.cusum), borderColor:'#2c7be5', pointRadius:2, fill:false },
        { label: `+임계 (${cu.critical})`, data: labels.map(()=>critLine), borderColor:'#e55353', borderDash:[5,5], pointRadius:0, fill:false },
        { label: `-임계`, data: labels.map(()=>-critLine), borderColor:'#e55353', borderDash:[5,5], pointRadius:0, fill:false },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: { x: { title:{display:true,text:'관측 순번 (X 오름차순)'} }, y: { title:{display:true,text:'누적 부호합'} } }
    }
  });
  document.getElementById('cusumChart').parentElement.style.height = '280px';
  document.getElementById('cusumSection').style.display = '';
}

/* ---------- 이벤트 ---------- */
function showBanner(id, msgs) {
  const el = document.getElementById(id);
  if (!msgs || (Array.isArray(msgs) && msgs.length === 0)) { el.style.display='none'; el.innerHTML=''; return; }
  el.innerHTML = Array.isArray(msgs) ? msgs.map(m=>`• ${m}`).join('<br>') : msgs;
  el.style.display = 'block';
}

function run() {
  showBanner('warnBanner', []);
  showBanner('errBanner', '');
  try {
    const text = document.getElementById('data').value;
    const alpha = parseFloat(document.getElementById('alpha').value) || 0.05;
    const parsed = parseData(text);
    if (parsed.pairs.length < 3) throw new Error('유효한 데이터 쌍이 3개 미만입니다.');
    const pb = passingBablok(parsed.pairs, alpha);
    const kt = kendallTau(parsed.pairs);
    const cu = cusumLinearity(parsed.pairs, pb.slope, pb.intercept, alpha);
    renderResults(parsed, pb, kt, cu);
    renderChart(parsed.pairs, pb);
    renderCusum(cu);
    if (parsed.warnings.length || parsed.skipped) {
      const w = parsed.warnings.slice();
      if (parsed.skipped) w.unshift(`비수치/형식 오류로 ${parsed.skipped}개 행이 제외되었습니다.`);
      showBanner('warnBanner', w);
    }
  } catch (e) {
    showBanner('errBanner', `오류: ${e.message}`);
    console.error(e);
  }
}

const EXAMPLE = `# Passing-Bablok 1983 예제풍 데이터 (method comparison)
7\t7.2
8.3\t8.5
10.5\t10.3
9.0\t9.2
5.1\t5.4
4.7\t5.0
11.2\t11.5
13.0\t13.3
6.5\t6.7
14.2\t14.6
15.1\t15.3
3.8\t4.1
12.5\t12.7
2.9\t3.2
16.0\t16.4
18.3\t18.6
8.8\t9.0
7.6\t7.9
10.0\t10.2
11.8\t12.0`;

document.getElementById('run').addEventListener('click', run);
document.getElementById('loadExample').addEventListener('click', () => {
  document.getElementById('data').value = EXAMPLE;
  run();
});
document.getElementById('clear').addEventListener('click', () => {
  document.getElementById('data').value = '';
  showBanner('warnBanner', []);
  showBanner('errBanner', '');
